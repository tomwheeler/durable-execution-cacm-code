<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Multi-Bank Account Service</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">$</span>
      <div>
        <h1>Multi-Bank Account Service</h1>
        <p class="sub">Live balances &middot; per-bank API control</p>
      </div>
    </div>
    <div class="topbar-actions">
      <form id="create-bank-form" autocomplete="off">
        <input id="new-bank" class="inp" placeholder="city (e.g. seattle)">
        <button class="btn primary" type="submit">Create Bank</button>
      </form>
      <button id="reset-btn" class="btn danger">Reset All</button>
    </div>
  </header>

  <main id="banks" class="banks"></main>

  <div id="tx-overlay" class="overlay hidden">
    <div class="modal">
      <div class="modal-head">
        <h2 id="tx-title">Transactions</h2>
        <button id="tx-close" class="icon-btn" aria-label="Close">&times;</button>
      </div>
      <div class="modal-body">
        <table class="tx">
          <thead>
            <tr><th>Time</th><th>Type</th><th>Amount</th><th>Balance After</th><th>Confirmation #</th></tr>
          </thead>
          <tbody id="tx-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="/static/app.js"></script>
</body>
</html>
